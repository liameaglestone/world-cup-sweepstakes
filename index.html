<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Cup 2026 — Sweepstakes Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07090f;
      --surface:   #0d1120;
      --surface2:  #131929;
      --surface3:  #1a2236;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --text:      #eef2ff;
      --muted:     #6b7a9a;
      --muted2:    #8892a4;
      --gold:      #f59e0b;
      --gold-dim:  rgba(245,158,11,0.12);
      --blue:      #3b82f6;
      --blue-dim:  rgba(59,130,246,0.12);
      --red:       #ef4444;
      --red-dim:   rgba(239,68,68,0.12);
      --green:     #22c55e;
      --green-dim: rgba(34,197,94,0.12);
      --radius:    14px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 52px 24px 44px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(245,158,11,0.13) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 80% 120%, rgba(59,130,246,0.08) 0%, transparent 55%);
      pointer-events: none;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      color: var(--gold);
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .hero h1 {
      font-size: clamp(30px, 5.5vw, 52px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.08;
      margin-bottom: 14px;
    }
    .hero h1 .hl {
      background: linear-gradient(135deg, #f59e0b 10%, #ef4444 90%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-sub {
      font-size: 14px;
      color: var(--muted2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .hero-sub .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }
    .pulse-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
      font-weight: 600;
      font-size: 13px;
    }
    .pulse-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50%      { opacity:0.6; box-shadow: 0 0 0 5px rgba(34,197,94,0); }
    }

    /* ── LAYOUT ── */
    .main {
      max-width: 1240px;
      margin: 0 auto;
      padding: 28px 18px 100px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .card:hover {
      border-color: var(--border2);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .card-accent {
      height: 3px;
      border-radius: 3px 3px 0 0;
    }
    .card--gold .card-accent { background: linear-gradient(90deg, #d97706, #f59e0b, #fcd34d); }
    .card--blue .card-accent { background: linear-gradient(90deg, #1d4ed8, #3b82f6, #60a5fa); }
    .card--red  .card-accent { background: linear-gradient(90deg, #b91c1c, #ef4444, #f87171); }

    /* ── CARD HEADER ── */
    .card-head {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .card-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .card-name {
      font-size: 17px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
      line-height: 1.2;
    }
    .prize-pool {
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
    }
    .prize-pool span { font-size: 13px; font-weight: 500; color: var(--muted2); }
    .card-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 10px;
      font-size: 11px;
      color: var(--muted2);
      font-weight: 500;
    }

    /* ── TEAMS ── */
    .teams-wrap {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    .section-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .teams-list { display: flex; flex-direction: column; gap: 8px; }
    .team-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 13px;
      transition: border-color 0.2s;
    }
    .team-row:hover { border-color: var(--border2); }
    .team-row.team-live {
      border-color: rgba(34,197,94,0.3);
      background: rgba(34,197,94,0.04);
    }
    .t-flag { font-size: 26px; line-height: 1; flex-shrink: 0; }
    .t-body { flex: 1; min-width: 0; }
    .t-name { font-size: 14px; font-weight: 600; }
    .t-sub  { font-size: 11px; color: var(--muted2); margin-top: 2px; }
    .t-right { text-align: right; flex-shrink: 0; }
    .t-record { font-size: 13px; font-weight: 600; }
    .t-pts { font-size: 11px; color: var(--muted2); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.4;
    }
    .badge--live      { background: var(--green-dim);  color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .badge--advancing { background: var(--blue-dim);   color: #60a5fa;      border: 1px solid rgba(59,130,246,0.2); }
    .badge--groups    { background: var(--surface3);   color: var(--muted2);border: 1px solid var(--border); }
    .badge--out       { background: var(--red-dim);    color: #f87171;      border: 1px solid rgba(239,68,68,0.15); }
    .badge--tbd       { background: var(--surface3);   color: var(--muted); border: 1px solid var(--border); }
    .badge--winner    { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.25); }

    /* ── PRIZES ── */
    .prizes-wrap { padding: 14px 18px 16px; flex: 1; }
    .prize-list  { display: flex; flex-direction: column; gap: 7px; }
    .prize-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 11px;
      background: var(--surface2);
      border: 1px solid transparent;
      border-radius: 9px;
      transition: border-color 0.2s;
    }
    .prize-row:hover { border-color: var(--border); }
    .prize-row.is-yours {
      background: rgba(245,158,11,0.05);
      border-color: rgba(245,158,11,0.2);
    }
    .card--blue .prize-row.is-yours { background: rgba(59,130,246,0.05); border-color: rgba(59,130,246,0.2); }
    .card--red  .prize-row.is-yours { background: rgba(239,68,68,0.05);  border-color: rgba(239,68,68,0.2); }
    .p-icon { font-size: 17px; flex-shrink: 0; width: 26px; text-align: center; }
    .p-body { flex: 1; min-width: 0; }
    .p-name {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .p-value { font-size: 11px; color: var(--gold); font-weight: 500; margin-top: 1px; }
    .p-right { text-align: right; flex-shrink: 0; max-width: 45%; }
    .p-leader { font-size: 12px; font-weight: 600; line-height: 1.3; }
    .p-stat   { font-size: 10.5px; color: var(--muted2); margin-top: 1px; }
    .yours-tag {
      display: inline-block;
      background: rgba(245,158,11,0.15);
      color: var(--gold);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      vertical-align: middle;
      margin-left: 3px;
    }

    /* ── FOOTER BAR ── */
    .footer-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(13,17,32,0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 200;
    }
    .footer-left { font-size: 12px; color: var(--muted2); display: flex; align-items: center; gap: 10px; }
    .footer-left .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }
    #refresh-countdown { font-variant-numeric: tabular-nums; }
    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .refresh-btn:hover { background: var(--surface3); border-color: var(--border2); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── LOADING / ERROR ── */
    .skeleton {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 13px;
      grid-column: 1/-1;
    }
    .sk-spin {
      width: 18px; height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .error-banner {
      grid-column: 1/-1;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 13px;
      text-align: center;
    }

    /* ── LIVE MATCH TICKER ── */
    .live-ticker {
      background: rgba(34,197,94,0.06);
      border-bottom: 1px solid rgba(34,197,94,0.15);
      padding: 8px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .live-ticker:empty { display: none; }
    .ticker-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ticker-match {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.15);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ticker-match .score { color: var(--green); margin: 0 2px; }
    .ticker-match .clock { font-size: 10px; color: var(--muted2); font-weight: 400; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1000px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
      .hero { padding: 36px 16px 32px; }
      .main { padding: 20px 12px 90px; }
    }
  </style>
</head>
<body>

<header class="hero">
  <div class="hero-badge">⚽ FIFA World Cup 2026</div>
  <h1>Sweepstakes <span class="hl">Tracker</span></h1>
  <div class="hero-sub">
    <span class="pulse-dot">Live Data</span>
    <span class="sep"></span>
    <span id="hero-updated">Loading...</span>
    <span class="sep"></span>
    <span>3 sweepstakes · USA, Canada &amp; Mexico</span>
  </div>
</header>

<div class="live-ticker" id="live-ticker"></div>

<main class="main">
  <div class="grid" id="grid">
    <div class="skeleton"><div class="sk-spin"></div> Fetching tournament data…</div>
  </div>
</main>

<div class="footer-bar">
  <div class="footer-left">
    <span id="refresh-countdown">–</span>
    <span class="sep"></span>
    <span id="footer-updated">–</span>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="refresh-btn" onclick="runDiagnostics()" style="opacity:0.6;">🔍 Diagnose</button>
    <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Refresh
    </button>
  </div>
</div>
<!-- Debug bar — hidden by default, visible when ?debug is in the URL -->
<div id="dbg-bar" style="display:none; background:#0a0f1e; border-top:1px solid #1e3a5f; padding:6px 18px; font-size:11px; color:#6b7a9a; font-family:monospace;">
  <span id="dbg">–</span>
</div>

<!-- API Diagnostic Panel — triggered by the Run Diagnostics button -->
<div id="diag-panel" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; overflow:auto; padding:24px;">
  <div style="max-width:800px; margin:0 auto; background:#0d1120; border:1px solid #1e3a5f; border-radius:12px; padding:24px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h2 style="font-size:16px; font-weight:700;">API Diagnostics</h2>
      <button onclick="document.getElementById('diag-panel').style.display='none'"
              style="background:#1a2236; border:1px solid #2a3a56; color:#eef2ff; padding:6px 14px; border-radius:6px; cursor:pointer; font-family:inherit;">✕ Close</button>
    </div>
    <div id="diag-output" style="font-family:monospace; font-size:12px; line-height:1.7; color:#8892a4;">Running…</div>
    <button onclick="copyDiag()"
            style="margin-top:16px; background:#1a2236; border:1px solid #2a3a56; color:#eef2ff; padding:8px 16px; border-radius:6px; cursor:pointer; font-family:inherit; font-size:12px;">
      📋 Copy all results
    </button>
  </div>
</div>

<script>
  if (location.search.includes('debug')) {
    document.getElementById('dbg-bar').style.display = 'block';
  }

  let _diagText = '';

  async function runDiagnostics() {
    document.getElementById('diag-panel').style.display = 'block';
    const out = document.getElementById('diag-output');
    _diagText = '';
    out.innerHTML = '';

    const ESPN_BASE = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world';
    // First, grab a completed event ID from June 11 so we can test a summary
    let summaryTestUrl = null;
    try {
      const sb11 = await fetch(`${ESPN_BASE}/scoreboard?dates=20260611&limit=20`).then(r=>r.json());
      const done = (sb11?.events ?? []).find(ev => ev.competitions?.[0]?.status?.type?.completed === true);
      if (done) summaryTestUrl = `${ESPN_BASE}/summary?event=${done.id}`;
    } catch(_) {}

    // Also grab the first completed event from June 12
    let summaryTestUrl2 = null;
    try {
      const sb12 = await fetch(`${ESPN_BASE}/scoreboard?dates=20260612&limit=20`).then(r=>r.json());
      const done12 = (sb12?.events ?? []).find(ev => ev.competitions?.[0]?.status?.type?.completed === true);
      if (done12) summaryTestUrl2 = `${ESPN_BASE}/summary?event=${done12.id}`;
    } catch(_) {}

    const tests = [
      `${ESPN_BASE}/scoreboard?dates=20260611&limit=20`,
      `${ESPN_BASE}/scoreboard?dates=20260612&limit=20`,
      `${ESPN_BASE}/scoreboard?dates=20260613&limit=20`,
      ...(summaryTestUrl  ? [summaryTestUrl]  : []),
      ...(summaryTestUrl2 ? [summaryTestUrl2] : []),
    ];

    for (const url of tests) {
      const shortUrl = url.replace('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/', '')
                         .replace('https://sports.core.api.espn.com/v2/sports/soccer/leagues/fifa.world/', 'core/');
      try {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 10000);
        const r = await fetch(url, { signal: ctrl.signal });
        clearTimeout(t);
        const data = await r.json();
        const keys = Object.keys(data ?? {});

        // For scoreboard: show event count + status/teams/id of each event
        let extra = '';
        if (url.includes('scoreboard') && data?.events) {
          extra = `\n   events: ${data.events.length}`;
          data.events.slice(0, 8).forEach((ev, i) => {
            const comp = ev.competitions?.[0];
            const statusName = comp?.status?.type?.name ?? '?';
            const completed  = comp?.status?.type?.completed ?? '?';
            const teams = (comp?.competitors ?? [])
              .map(c => `${c.team?.displayName ?? '?'}(${c.score ?? '?'})`)
              .join(' v ');
            extra += `\n   [${i}] id:${ev.id} | ${statusName} (completed:${completed}) | ${teams}`;
          });
        } else if (url.includes('summary') && data?.header) {
          // For summary: show teams, details count, and structure of first few details
          const comp = data.header?.competitions?.[0];
          const teams = (comp?.competitors ?? []).map(c=>`${c.team?.displayName}(${c.score})`).join(' v ');
          const details = comp?.details ?? [];
          extra = `\n   match: ${teams}`;
          extra += `\n   details count: ${details.length}`;
          details.slice(0, 8).forEach((d, i) => {
            extra += `\n   detail[${i}]: yellowCard:${d.yellowCard} redCard:${d.redCard} penaltyKick:${d.penaltyKick} | typeId:${d.type?.id} typeDesc:${d.type?.description} | team:${d.team?.displayName} | clock:${d.clock?.displayValue}`;
          });
          // Show all boxscore stat names so we can find the correct corner stat
          const bsTeams = data.boxscore?.teams ?? [];
          bsTeams.forEach(t => {
            const allStats = (t.statistics ?? []).map(s => `${s.name}=${s.displayValue}`).join(', ');
            extra += `\n   boxscore ${t.team?.displayName}: ${allStats}`;
          });
        } else {
          extra = `\n   preview: ${JSON.stringify(data).slice(0, 300)}`;
        }

        const line = `✅ ${shortUrl}\n   status: ${r.status} | keys: [${keys.join(', ')}]${extra}\n\n`;
        out.innerHTML += `<div style="margin-bottom:12px; padding:10px; background:#0a0f1e; border-radius:6px; border-left:3px solid #22c55e; word-break:break-all; white-space:pre-wrap;">
<b style="color:#22c55e">✅ ${shortUrl}</b>
<span style="color:#6b7a9a">HTTP ${r.status} | keys: [${keys.join(', ')}]</span>${extra}
</div>`;
        _diagText += line;
      } catch (e) {
        const line = `❌ ${shortUrl}\n   error: ${e.message}\n\n`;
        out.innerHTML += `<div style="margin-bottom:12px; padding:10px; background:#0a0f1e; border-radius:6px; border-left:3px solid #ef4444; word-break:break-all;">
          <b style="color:#ef4444">❌ ${shortUrl}</b><br>
          <span style="color:#6b7a9a">${e.message}</span>
        </div>`;
        _diagText += line;
      }
    }
    out.innerHTML += '<div style="color:#f59e0b; margin-top:8px;">Done — click "Copy all results" and share with Claude.</div>';
  }

  function copyDiag() {
    navigator.clipboard.writeText(_diagText).catch(() => {
      prompt('Copy this:', _diagText);
    });
  }
</script>

   TEAM NAME NORMALISATION

const ESPN_NAME_MAP = {
  'ivory coast':                'Ivory Coast',
  "côte d'ivoire":              'Ivory Coast',
  "cote d'ivoire":              'Ivory Coast',
  'dr congo':                   'DR Congo',
  'congo dr':                   'DR Congo',
  'democratic republic of congo':'DR Congo',
  'congo, dr':                  'DR Congo',
  'colombia':                   'Colombia',
  'england':                    'England',
  'spain':                      'Spain',
  'czech republic':             'Czechia',
  'czechia':                    'Czechia',
  'bosnia-herzegovina':         'Bosnia-Herzegovina',
  'bosnia & herzegovina':       'Bosnia-Herzegovina',
  'bosnia and herzegovina':     'Bosnia-Herzegovina',
};

function normEspn(name) {
  if (!name) return name;
  return ESPN_NAME_MAP[name.toLowerCase()] ?? name;
}

function myTeamNames(sw) {
  return sw.teams.map(t => t.espn).filter(Boolean).map(normEspn);
}

/* ════════════════════════════════════════════════════════
   APP STATE
════════════════════════════════════════════════════════ */

const state = {
  standings:      {},   // normalised team name → { position, group, pts, gp, gf, ga, gd, note }
  matchCache:     {},   // eventId → { processed, completed, groupStage, home, away, homeScore, awayScore,
                        //             yellows:{team→n}, corners:{team→n}, reds:[{team,min}], pens:[{team,min}] }
  liveMatches:    [],   // [{home,away,homeScore,awayScore,clock,eventId}]
  fetchedEventIds:new Set(),
  lastUpdated:    null,
  apiError:       false,
};

/* ════════════════════════════════════════════════════════
   ESPN API
════════════════════════════════════════════════════════ */

const ESPN = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world';
const WC_START = new Date('2026-06-11');

async function apiFetch(url) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 10000);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(t);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  } catch (e) {
    clearTimeout(t);
    throw e;
  }
}

async function fetchStandings() {
  // Try several URL variants — ESPN sometimes requires season/seasontype params
  const urls = [
    `${ESPN}/standings`,
    `${ESPN}/standings?season=2026`,
    `${ESPN}/standings?season=2026&seasontype=2`,
    `https://sports.core.api.espn.com/v2/sports/soccer/leagues/fifa.world/seasons/2026/types/2/groups?limit=20`,
  ];
  for (const url of urls) {
    try {
      const data = await apiFetch(url);
      // Check if this response actually has standings data
      if (hasStandingsData(data)) {
        console.log('[WC] Standings found at:', url);
        return data;
      }
      console.warn('[WC] Standings empty from:', url, '— keys:', Object.keys(data ?? {}));
    } catch (e) {
      console.warn('[WC] Standings failed:', url, e.message);
    }
  }
  throw new Error('All standings endpoints failed or empty');
}

function hasStandingsData(data) {
  if (!data) return false;
  if (Array.isArray(data?.standings) && data.standings.length > 0) return true;
  if (data?.standings?.groups?.length > 0) return true;
  if (data?.children?.length > 0) return true;   // sports.core format
  if (data?.items?.length > 0 && !data.items[0]?.$ref) return true; // paginated core (skip $ref-only pages)
  return false;
}

// ESPN scoreboard only supports a single date, not ranges
async function fetchScoreboardDate(yyyymmdd) {
  const data = await apiFetch(`${ESPN}/scoreboard?dates=${yyyymmdd}&limit=50`);
  const count = data?.events?.length ?? 0;
  if (count === 0) console.warn('[WC] Scoreboard empty for date:', yyyymmdd, '— keys:', Object.keys(data ?? {}));
  return data;
}

async function fetchSummary(eventId) {
  return apiFetch(`${ESPN}/summary?event=${eventId}`);
}

const WC_END = new Date('2026-07-19'); // Final

// Returns array of 'YYYYMMDD' strings from WC_START through today (capped at WC_END)
function wcDates() {
  const dates = [];
  const today = new Date();
  today.setHours(23, 59, 59);
  const cap = today < WC_END ? today : WC_END;
  for (let d = new Date(WC_START); d <= cap; d.setDate(d.getDate() + 1)) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    dates.push(`${y}${m}${day}`);
  }
  return dates;
}

/* ════════════════════════════════════════════════════════
   DATA PROCESSING
════════════════════════════════════════════════════════ */

function processStandings(data) {
  // ESPN returns groups in several different shapes depending on the endpoint/season:
  //   data.standings           → array of groups  (site API, some seasons)
  //   data.standings.groups    → array of groups  (site API, other seasons)
  //   data.children            → array of groups  (sports.core groups endpoint)
  let groups = [];
  if (Array.isArray(data?.standings))       groups = data.standings;
  else if (data?.standings?.groups?.length) groups = data.standings.groups;
  else if (data?.children?.length)          groups = data.children;

  console.log('[WC] processStandings: found', groups.length, 'groups');

  for (const group of groups) {
    const groupName = group.name ?? group.shortName ?? group.abbreviation ?? '';
    // Entries live at group.standings.entries or group.entries or group.standings (if array)
    const entries =
      group.standings?.entries ??
      group.entries ??
      (Array.isArray(group.standings) ? group.standings : []);

    for (const entry of entries) {
      const raw = entry.team?.displayName ?? entry.team?.name;
      if (!raw) continue;
      const name = normEspn(raw);
      const stats = {};
      for (const s of (entry.stats ?? [])) stats[s.name] = s.value;
      state.standings[name] = {
        name,
        rawName:  raw,
        abbrev:   entry.team?.abbreviation,
        group:    groupName,
        position: entry.rank ?? entry.standing,
        note:     entry.note?.description ?? '',
        pts:   stats.points        ?? 0,
        gp:    stats.gamesPlayed   ?? 0,
        wins:  stats.wins          ?? 0,
        draws: stats.ties          ?? 0,
        losses:stats.losses        ?? 0,
        gf:    stats.pointsFor     ?? stats.goalsFor     ?? 0,
        ga:    stats.pointsAgainst ?? stats.goalsAgainst ?? 0,
        gd:   (stats.pointsFor ?? 0) - (stats.pointsAgainst ?? 0),
      };
    }
  }
  console.log('[WC] Standings populated:', Object.keys(state.standings).length, 'teams');
}

// Returns true for any ESPN status that means the match is over.
// ESPN uses STATUS_FINAL for most sports but WC 2026 may differ.
function matchIsCompleted(comp) {
  const t = comp?.status?.type ?? {};
  if (t.completed === true) return true;
  const n = (t.name ?? '').toUpperCase();
  return n.includes('FINAL') || n.includes('FULL_TIME') || n.includes('ENDED') || n.includes('COMPLETE');
}

// seedMatchCache: pull completed events from a scoreboard response into matchCache.
// Does NOT touch liveMatches — call updateLiveMatches separately for today's board.
function seedMatchCache(data) {
  let added = 0;
  for (const ev of (data?.events ?? [])) {
    if (state.matchCache[ev.id]) continue; // already have it
    const comp = ev.competitions?.[0];
    if (!comp) continue;

    const statusName = comp.status?.type?.name ?? 'UNKNOWN';
    const completed  = matchIsCompleted(comp);
    const live       = (comp.status?.type?.name ?? '').includes('IN_PROGRESS');

    if (!completed && !live) {
      console.log('[WC] Skipping event', ev.id, 'status:', statusName);
      continue;
    }

    const homeC = comp.competitors?.find(c => c.homeAway === 'home') ?? comp.competitors?.[0];
    const awayC = comp.competitors?.find(c => c.homeAway === 'away') ?? comp.competitors?.[1];
    state.matchCache[ev.id] = {
      processed: false, fetchErrors: 0,
      completed,
      groupStage: ev.season?.slug === 'group-stage',
      home: normEspn(homeC?.team?.displayName ?? ''),
      away: normEspn(awayC?.team?.displayName ?? ''),
      homeScore: parseInt(homeC?.score ?? 0) || 0,
      awayScore: parseInt(awayC?.score ?? 0) || 0,
      date: ev.date ?? '',
      yellows: {}, corners: {}, reds: [], pens: [],
    };
    if (completed) added++;
  }
  if (added > 0) console.log('[WC] seedMatchCache added', added, 'completed matches');
}

// computeStandingsFromMatches: derive team stats directly from match results.
// Used as primary source since ESPN's 2026 WC standings endpoint returns {}.
function computeStandingsFromMatches() {
  const computed = {};

  for (const m of Object.values(state.matchCache)) {
    if (!m.completed || !m.home || !m.away) continue;

    for (const [team, isHome] of [[m.home, true], [m.away, false]]) {
      if (!team) continue;
      if (!computed[team]) {
        computed[team] = { name: team, gp: 0, wins: 0, draws: 0, losses: 0, gf: 0, ga: 0, pts: 0, gd: 0, computed: true };
      }
      const s  = computed[team];
      const gf = isHome ? m.homeScore : m.awayScore;
      const ga = isHome ? m.awayScore : m.homeScore;
      s.gp++; s.gf += gf; s.ga += ga; s.gd = s.gf - s.ga;
      if (gf > ga)      { s.wins++;   s.pts += 3; }
      else if (gf===ga) { s.draws++;  s.pts += 1; }
      else              { s.losses++; }
    }
  }

  // Merge computed into state.standings, preserving real ESPN data where present
  for (const [name, data] of Object.entries(computed)) {
    if (!state.standings[name]) state.standings[name] = data;
  }

  const n = Object.keys(computed).length;
  if (n > 0) console.log('[WC] computeStandingsFromMatches:', n, 'teams derived from match results');
}

// updateLiveMatches: refresh liveMatches from today's scoreboard only.
function updateLiveMatches(data) {
  state.liveMatches = [];
  for (const ev of (data?.events ?? [])) {
    const comp = ev.competitions?.[0];
    if (!comp) continue;
    const status = comp.status?.type?.name ?? '';
    if (status !== 'STATUS_IN_PROGRESS' && status !== 'STATUS_HALFTIME') continue;

    const homeC = comp.competitors?.find(c => c.homeAway === 'home') ?? comp.competitors?.[0];
    const awayC = comp.competitors?.find(c => c.homeAway === 'away') ?? comp.competitors?.[1];
    state.liveMatches.push({
      home: normEspn(homeC?.team?.displayName ?? ''),
      away: normEspn(awayC?.team?.displayName ?? ''),
      homeScore: parseInt(homeC?.score ?? 0) || 0,
      awayScore: parseInt(awayC?.score ?? 0) || 0,
      clock: comp.status?.displayClock ?? '',
      eventId: ev.id,
    });
    // Also seed into matchCache in case it ends before next refresh
    if (!state.matchCache[ev.id]) {
      const homeC2 = comp.competitors?.find(c => c.homeAway === 'home') ?? comp.competitors?.[0];
      const awayC2 = comp.competitors?.find(c => c.homeAway === 'away') ?? comp.competitors?.[1];
      state.matchCache[ev.id] = {
        processed: false, completed: false,
        home: normEspn(homeC2?.team?.displayName ?? ''),
        away: normEspn(awayC2?.team?.displayName ?? ''),
        homeScore: 0, awayScore: 0, date: ev.date ?? '',
        yellows: {}, corners: {}, reds: [], pens: [],
      };
    }
  }
}

function processSummary(eventId, data) {
  const cached = state.matchCache[eventId];
  if (!cached || cached.processed) return;

  // ── Yellow cards & corners from boxscore team statistics ──────────────────
  for (const teamData of (data?.boxscore?.teams ?? [])) {
    const name = normEspn(teamData.team?.displayName ?? '');
    if (!name) continue;
    for (const s of (teamData.statistics ?? [])) {
      const key = (s.name ?? '').toLowerCase();
      const lbl = (s.label ?? '').toLowerCase();
      const v   = parseInt(s.displayValue ?? s.value ?? 0) || 0;
      if (key === 'yellowcards' || lbl.includes('yellow card')) cached.yellows[name] = v;
      if (key === 'woncorners' || key === 'cornerkicks' || lbl.includes('corner')) cached.corners[name] = v;
    }
  }

  // ── Key events from header.competitions[0].details ───────────────────────
  // ESPN stores red cards, penalties etc. here with boolean flags.
  const details = data?.header?.competitions?.[0]?.details ?? [];
  for (const d of details) {
    const teamName = normEspn(
      d.team?.displayName ?? d.team?.shortDisplayName ?? ''
    );
    const min = d.clock?.displayValue ?? '?';

    // Red card (direct red or second yellow → red)
    if (d.redCard === true || d.yellowRedCard === true) {
      if (teamName) cached.reds.push({ team: teamName, min });
    }

    // Penalty kick: d.team is the team that TOOK it (scored/attempted).
    // We want the team that CONCEDED it (the other side).
    if (d.penaltyKick === true) {
      const conceder = teamName === cached.home ? cached.away : cached.home;
      if (conceder) cached.pens.push({ team: conceder, min });
    }
  }

  // ── Fallback: scan commentary/plays if details were empty ────────────────
  if (!details.length) {
    const plays = data?.commentary ?? data?.plays ?? [];
    for (const p of plays) {
      const txt  = (p.type?.text ?? p.text ?? '').toLowerCase();
      const team = normEspn(p.team?.displayName ?? '');
      const min  = p.clock?.displayValue ?? '?';
      if (p.redCard || txt.includes('red card')) {
        if (team) cached.reds.push({ team, min });
      }
      if (p.penaltyKick || (txt.includes('penalty') && !txt.includes('miss') && !txt.includes('saved'))) {
        const conceder = team === cached.home ? cached.away : cached.home;
        if (conceder) cached.pens.push({ team: conceder, min });
      }
    }
  }

  cached.processed = true;
  saveCache();
}

/* ════════════════════════════════════════════════════════
   COMPUTED / AGGREGATED STATS
════════════════════════════════════════════════════════ */

function teamIsLive(espnName) {
  const n = normEspn(espnName);
  return state.liveMatches.some(m => m.home === n || m.away === n);
}

function getTeamStanding(espnName) {
  return state.standings[normEspn(espnName)] ?? null;
}

function aggGroupYellows() {
  const out = {};
  for (const m of Object.values(state.matchCache)) {
    if (!m.completed || m.groupStage === false) continue;
    for (const [t, v] of Object.entries(m.yellows)) out[t] = (out[t] ?? 0) + v;
  }
  return out;
}

function aggGroupCorners() {
  const out = {};
  for (const m of Object.values(state.matchCache)) {
    if (!m.completed || m.groupStage === false) continue;
    for (const [t, v] of Object.entries(m.corners)) out[t] = (out[t] ?? 0) + v;
  }
  return out;
}

function aggCleanSheets() {
  const out = {};
  for (const m of Object.values(state.matchCache)) {
    if (!m.completed) continue;
    if (m.awayScore === 0) out[m.home] = (out[m.home] ?? 0) + 1;
    if (m.homeScore === 0) out[m.away] = (out[m.away] ?? 0) + 1;
  }
  return out;
}

function aggGoalsConceded() {
  const out = {};
  for (const [name, s] of Object.entries(state.standings)) {
    out[name] = s.ga;
  }
  return out;
}

function aggBiggestDefeats() {
  const out = {};
  for (const m of Object.values(state.matchCache)) {
    if (!m.completed) continue;
    const margin = m.homeScore - m.awayScore;
    if (margin > 0) {
      const cur = out[m.away];
      if (!cur || margin > cur.margin) out[m.away] = { margin, score: `${m.awayScore}–${m.homeScore}`, opp: m.home };
    } else if (margin < 0) {
      const cur = out[m.home];
      if (!cur || -margin > cur.margin) out[m.home] = { margin: -margin, score: `${m.homeScore}–${m.awayScore}`, opp: m.away };
    }
  }
  return out;
}

function getFirstRedCard() {
  const all = [];
  for (const m of Object.values(state.matchCache)) {
    if (!m.completed) continue;
    for (const r of m.reds) all.push({ ...r, matchDate: m.date });
  }
  all.sort((a, b) => {
    const dateCmp = new Date(a.matchDate) - new Date(b.matchDate);
    if (dateCmp !== 0) return dateCmp;
    return parseInt(a.min) - parseInt(b.min);
  });
  return all[0] ?? null;
}

function getFirstPenalty() {
  const all = [];
  for (const m of Object.values(state.matchCache)) {
    if (!m.completed) continue;
    for (const p of m.pens) all.push({ ...p, matchDate: m.date });
  }
  all.sort((a, b) => {
    const dateCmp = new Date(a.matchDate) - new Date(b.matchDate);
    if (dateCmp !== 0) return dateCmp;
    return parseInt(a.min) - parseInt(b.min);
  });
  return all[0] ?? null;
}

/* ════════════════════════════════════════════════════════
   STAT RESOLVERS
════════════════════════════════════════════════════════ */

function topEntry(map) {
  return Object.entries(map).sort((a,b) => b[1] - a[1])[0] ?? null;
}

function resolveStat(stat, sw) {
  const mine = myTeamNames(sw);
  const isYours = (name) => mine.includes(normEspn(name));

  switch (stat) {
    case 'tournament_winner': {
      return { label: 'TBD', sub: 'Tournament in progress', yours: false };
    }
    case 'tournament_runner_up': {
      return { label: 'TBD', sub: 'Tournament in progress', yours: false };
    }
    case 'goal_of_tournament': {
      return { label: 'Pending', sub: 'Announced at tournament end', yours: false };
    }
    case 'first_red_card': {
      const r = getFirstRedCard();
      if (!r) return { label: 'None yet', sub: 'Tracking from match data', yours: false };
      return { label: r.team, sub: `${r.min}'`, yours: isYours(r.team) };
    }
    case 'group_yellows': {
      const m = aggGroupYellows();
      const top = topEntry(m);
      if (!top) return { label: 'Loading…', sub: null, yours: false };
      const [team, count] = top;
      const others = Object.entries(m).filter(([t]) => isYours(t)).sort((a,b)=>b[1]-a[1]);
      const yourBest = others[0];
      return {
        label: team,
        sub: `${count} yellow${count!==1?'s':''}`,
        yours: isYours(team),
        extra: (yourBest && !isYours(team)) ? `Your best: ${yourBest[0]} (${yourBest[1]})` : null,
      };
    }
    case 'group_corners': {
      const m = aggGroupCorners();
      const top = topEntry(m);
      if (!top) return { label: 'Loading…', sub: null, yours: false };
      const [team, count] = top;
      return { label: team, sub: `${count} corner${count!==1?'s':''}`, yours: isYours(team) };
    }
    case 'second_team_groups': {
      const ic = getTeamStanding('Ivory Coast');
      if (!ic) return { label: 'Checking…', sub: null, yours: false };
      const advanced = ic.note?.toLowerCase().includes('advance') || ic.position <= 2;
      if (advanced) return { label: '✅ Ivory Coast', sub: 'Progressed — money back!', yours: true };
      return {
        label: `${ordinal(ic.position)} in ${ic.group}`,
        sub: `${ic.pts} pts · ${ic.gp} played`,
        yours: false,
      };
    }
    case 'first_penalty': {
      const p = getFirstPenalty();
      if (!p) return { label: 'None yet', sub: 'Tracking from match data', yours: false };
      return { label: p.team, sub: `${p.min}'`, yours: isYours(p.team) };
    }
    case 'most_goals_conceded': {
      const m = aggGoalsConceded();
      const top = topEntry(m);
      if (!top) return { label: 'Loading…', sub: null, yours: false };
      const [team, count] = top;
      return { label: team, sub: `${count} conceded`, yours: isYours(team) };
    }
    case 'biggest_defeat': {
      const m = aggBiggestDefeats();
      const sorted = Object.entries(m).sort((a,b) => b[1].margin - a[1].margin);
      if (!sorted.length) return { label: 'Tracking…', sub: null, yours: false };
      const [team, d] = sorted[0];
      return { label: team, sub: `${d.score} vs ${d.opp}`, yours: isYours(team) };
    }
    case 'most_clean_sheets': {
      const m = aggCleanSheets();
      const top = topEntry(m);
      if (!top) return { label: 'Loading…', sub: null, yours: false };
      const [team, count] = top;
      return { label: team, sub: `${count} clean sheet${count!==1?'s':''}`, yours: isYours(team) };
    }
    default:
      return { label: '–', sub: null, yours: false };
  }
}

function ordinal(n) {
  if (!n) return '?';
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10] ?? s[v] ?? s[0]);
}

/* ════════════════════════════════════════════════════════
   RENDERING
════════════════════════════════════════════════════════ */

function renderTeamStatus(team) {
  if (!team.espn) return `<span class="badge badge--tbd">TBD</span>`;
  if (teamIsLive(team.espn)) return `<span class="badge badge--live">● Live</span>`;

  const s = getTeamStanding(team.espn);
  if (!s) return `<span class="badge badge--tbd">Checking…</span>`;

  // If ESPN standings API gave us group/position data, use it
  if (!s.computed) {
    if (s.note?.toLowerCase().includes('advance') || (s.position <= 2 && s.gp >= 3)) {
      return `<span class="badge badge--advancing">✓ Advancing</span>`;
    }
    if (s.note?.toLowerCase().includes('eliminat') || (s.position > 2 && s.gp >= 3)) {
      return `<span class="badge badge--out">Eliminated</span>`;
    }
    const pos = s.position ? `${ordinal(s.position)} · ` : '';
    return `<span class="badge badge--groups">${pos}${s.group}</span>`;
  }

  // Computed from match results — show W/D/L record
  if (!s.gp) return `<span class="badge badge--tbd">No matches yet</span>`;
  return `<span class="badge badge--groups">${s.wins}W ${s.draws}D ${s.losses}L · ${s.pts}pts</span>`;
}

function renderTeamRecord(team) {
  if (!team.espn) return '';
  const s = getTeamStanding(team.espn);
  if (!s || !s.gp) return '';
  return `${s.gf}–${s.ga}`;
}

function renderTeamPts(team) {
  if (!team.espn) return '';
  const s = getTeamStanding(team.espn);
  if (!s || !s.gp) return '';
  return `${s.pts}pts · ${s.gp}GP`;
}

function renderCard(sw) {
  const pool = sw.buyIn * sw.participants;

  const teamsHtml = sw.teams.map(team => {
    const isLive = team.espn && teamIsLive(team.espn);
    const record  = renderTeamRecord(team);
    const pts     = renderTeamPts(team);
    return `
      <div class="team-row${isLive ? ' team-live' : ''}">
        <span class="t-flag">${team.flag}</span>
        <div class="t-body">
          <div class="t-name">${team.name}</div>
          <div class="t-sub">${renderTeamStatus(team)}</div>
        </div>
        ${record ? `<div class="t-right"><div class="t-record">${record}</div><div class="t-pts">${pts}</div></div>` : ''}
      </div>`;
  }).join('');

  const prizesHtml = sw.prizes.map(prize => {
    const res = resolveStat(prize.stat, sw);
    const valueHtml = prize.value ? `<div class="p-value">£${prize.value}</div>` : '';
    const yoursTag  = res.yours ? `<span class="yours-tag">YOURS</span>` : '';
    return `
      <div class="prize-row${res.yours ? ' is-yours' : ''}">
        <span class="p-icon">${prize.icon}</span>
        <div class="p-body">
          <div class="p-name">${prize.name}</div>
          ${valueHtml}
        </div>
        <div class="p-right">
          <div class="p-leader">${res.label}${yoursTag}</div>
          ${res.sub  ? `<div class="p-stat">${res.sub}</div>`   : ''}
          ${res.extra? `<div class="p-stat" style="color:var(--gold);opacity:.8">${res.extra}</div>` : ''}
        </div>
      </div>`;
  }).join('');

  return `
    <div class="card card--${sw.color}">
      <div class="card-accent"></div>
      <div class="card-head">
        <div class="card-title-row">
          <div class="card-name">${sw.icon} ${sw.name}</div>
          <div class="prize-pool">£${pool}<span> pot</span></div>
        </div>
        <div class="card-chips">
          <span class="chip">£${sw.buyIn} buy-in</span>
          <span class="chip">👥 ${sw.participants} players</span>
        </div>
      </div>
      <div class="teams-wrap">
        <div class="section-label">Your Teams</div>
        <div class="teams-list">${teamsHtml}</div>
      </div>
      <div class="prizes-wrap">
        <div class="section-label">Prize Categories</div>
        <div class="prize-list">${prizesHtml}</div>
      </div>
    </div>`;
}

function renderTicker() {
  const ticker = document.getElementById('live-ticker');
  if (!state.liveMatches.length) { ticker.innerHTML = ''; return; }
  ticker.innerHTML = `
    <span class="ticker-label">Live Now</span>
    ${state.liveMatches.map(m => `
      <div class="ticker-match">
        ${m.home} <span class="score">${m.homeScore}–${m.awayScore}</span> ${m.away}
        <span class="clock">${m.clock ?? ''}</span>
      </div>`).join('')}`;
}

function renderAll() {
  const grid = document.getElementById('grid');
  const standingsCount = Object.keys(state.standings).length;
  const matchCount     = Object.keys(state.matchCache).length;
  const processedCount = Object.values(state.matchCache).filter(m => m.processed).length;

  // Update debug panel
  const dbg = document.getElementById('dbg');
  if (dbg) {
    dbg.innerHTML = [
      `Standings: <b>${standingsCount} teams</b>`,
      `Matches in cache: <b>${matchCount}</b> (${processedCount} summarised)`,
      `Live: <b>${state.liveMatches.length}</b>`,
      `Last refresh: <b>${state.lastUpdated ? new Date(state.lastUpdated).toLocaleTimeString() : '—'}</b>`,
      state.apiError ? `<span style="color:#f87171">⚠ API error on last refresh</span>` : '',
      standingsCount === 0 && !state.apiError ? `<span style="color:#fbbf24">⚠ Standings returned empty — check console</span>` : '',
    ].filter(Boolean).join(' &nbsp;·&nbsp; ');
  }

  if (matchCount === 0 && state.apiError) {
    grid.innerHTML = `<div class="error-banner">⚠️ Could not reach the match data API — check your connection and refresh.</div>`;
    return;
  }

  grid.innerHTML = SWEEPSTAKES.map(renderCard).join('');
  renderTicker();
  updateTimestamps();
}

function updateTimestamps() {
  if (!state.lastUpdated) return;
  const diff = Math.round((Date.now() - state.lastUpdated) / 1000);
  const ago  = diff < 60 ? `${diff}s ago` : `${Math.round(diff/60)}m ago`;
  document.getElementById('hero-updated').textContent = `Updated ${ago}`;
  document.getElementById('footer-updated').textContent = `Last updated ${ago}`;
}

/* ════════════════════════════════════════════════════════
   LOCALSTORAGE CACHE
   Persist processed match summaries so we don't re-fetch
   them on every page load.
════════════════════════════════════════════════════════ */

const CACHE_KEY = 'wc26_matchCache_v3'; // v3: adds groupStage flag, fixes cornerKicks→wonCorners, sorts first red/penalty by date
const CACHE_TTL = 12 * 60 * 60 * 1000; // 12 hours

function saveCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      ts: Date.now(),
      matches: state.matchCache,
    }));
  } catch (_) {}
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return;
    const { ts, matches } = JSON.parse(raw);
    if (Date.now() - ts > CACHE_TTL) return; // expired
    // Only restore already-processed entries to avoid skipping re-fetch
    for (const [id, m] of Object.entries(matches)) {
      if (m.processed) state.matchCache[id] = m;
    }
  } catch (_) {}
}

/* ════════════════════════════════════════════════════════
   REFRESH LOOP
════════════════════════════════════════════════════════ */

let _refreshTimer   = null;
let _countdownTimer = null;
let _nextRefreshAt  = null;
let _historicalDone = false;

async function refreshData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  state.apiError = false;

  try {
    const dates = wcDates();
    const todayStr = dates[dates.length - 1];

    // ── 1. Standings + today's live scoreboard (always) ──────────────────
    const [standingsRes, todayRes] = await Promise.allSettled([
      fetchStandings(),
      fetchScoreboardDate(todayStr),
    ]);

    if (standingsRes.status === 'fulfilled') {
      processStandings(standingsRes.value);
      console.log('[WC] Standings OK — teams loaded:', Object.keys(state.standings).length);
    } else {
      console.error('[WC] Standings FAILED:', standingsRes.reason);
    }

    if (todayRes.status === 'fulfilled') {
      updateLiveMatches(todayRes.value);
      seedMatchCache(todayRes.value);
      console.log('[WC] Today scoreboard OK — events:', todayRes.value?.events?.length ?? 0, '| live:', state.liveMatches.length);
    } else {
      console.error('[WC] Today scoreboard FAILED:', todayRes.reason);
    }

    if (standingsRes.status === 'rejected' && todayRes.status === 'rejected') {
      state.apiError = true;
    }

    // ── 2. Historical scoreboards (once per session) ──────────────────────
    // Fetch every day from WC start so we have all completed match IDs.
    if (!_historicalDone) {
      const pastDates = dates.slice(0, -1); // all days except today (already fetched)
      await Promise.allSettled(
        pastDates.map(date =>
          fetchScoreboardDate(date)
            .then(d => seedMatchCache(d))
            .catch(() => {})
        )
      );
      _historicalDone = true;
    }

    // ── 3. Summaries for any unprocessed completed matches ────────────────
    const toFetch = Object.entries(state.matchCache)
      .filter(([, m]) => m.completed && !m.processed && (m.fetchErrors ?? 0) < 3)
      .map(([id]) => id);

    console.log('[WC] Fetching', toFetch.length, 'match summaries');
    await Promise.allSettled(
      toFetch.map(id =>
        fetchSummary(id)
          .then(data => processSummary(id, data))
          .catch(e => {
            state.matchCache[id].fetchErrors = (state.matchCache[id].fetchErrors ?? 0) + 1;
            console.warn('[WC] Summary failed for', id, `(attempt ${state.matchCache[id].fetchErrors})`, e.message);
          })
      )
    );
    console.log('[WC] Match cache:', Object.keys(state.matchCache).length, 'entries,',
      Object.values(state.matchCache).filter(m => m.processed).length, 'processed');

    // Derive team standings from match results (ESPN standings API returns {} for 2026 WC)
    computeStandingsFromMatches();

    state.lastUpdated = Date.now();
    renderAll();

  } catch (err) {
    console.warn('Refresh error:', err);
    state.apiError = true;
    renderAll();
  } finally {
    btn.classList.remove('spinning');
    scheduleNext();
  }
}

function scheduleNext() {
  clearTimeout(_refreshTimer);
  clearInterval(_countdownTimer);

  const interval = state.liveMatches.length > 0 ? 30 : 60;
  _nextRefreshAt  = Date.now() + interval * 1000;
  _refreshTimer   = setTimeout(() => refreshData(), interval * 1000);

  _countdownTimer = setInterval(() => {
    const remaining = Math.max(0, Math.round((_nextRefreshAt - Date.now()) / 1000));
    document.getElementById('refresh-countdown').textContent = `Refreshes in ${remaining}s`;
    updateTimestamps();
  }, 1000);
}

function manualRefresh() {
  clearTimeout(_refreshTimer);
  clearInterval(_countdownTimer);
  _historicalDone = false; // force re-fetch of historical data too
  refreshData();
}

/* ════════════════════════════════════════════════════════
   BOOT
════════════════════════════════════════════════════════ */

loadCache();
refreshData();
</script>
